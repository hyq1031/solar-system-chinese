<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太阳系 3D 可视化 - Solar System 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
    }
    
    #canvas-container {
      width: 100vw;
      height: 100vh;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 100;
    }
    
    #ui h1 {
      font-size: 24px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    
    #ui p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 5px;
    }
    
    #planet-list {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 10px;
    color: white;
    font-family: Arial, sans-serif;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid rgba(255, 255, 255, 0.3);
    width: 60px;
    overflow: hidden;
    transition: width 0.3s;
  }
  
  #planet-list:hover {
    width: 180px;
  }
  
  #planet-list h3 {
    margin: 0 0 10px 0;
    font-size: 24px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding-bottom: 10px;
  }
  
  #planet-list ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  
  #planet-list li {
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s;
    text-align: center;
    position: relative;
  }
  
  .planet-icon {
    display: inline-block;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    position: relative;
  }
  
  .planet-icon.mercury {
    background: linear-gradient(135deg, #8c8c8c, #696969);
  }
  
  .planet-icon.venus {
    background: linear-gradient(135deg, #e6c87a, #c9a854);
  }
  
  .planet-icon.earth {
    background: linear-gradient(135deg, #6b93d6, #4f7dc9);
  }
  
  .planet-icon.mars {
    background: linear-gradient(135deg, #c1440e, #a3360a);
  }
  
  .planet-icon.jupiter {
    background: linear-gradient(135deg, #d4a574, #b8956a);
  }
  
  .planet-icon.saturn {
    background: linear-gradient(135deg, #f4d59e, #e6c87a);
  }
  
  .planet-icon.saturn::after {
    content: '';
    position: absolute;
    width: 40px;
    height: 8px;
    background: rgba(201, 184, 150, 0.6);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
  }
  
  .planet-icon.uranus {
    background: linear-gradient(135deg, #a8d8ea, #87ceeb);
  }
  
  .planet-icon.neptune {
    background: linear-gradient(135deg, #4b70dd, #3d5cc4);
  }
  
  #planet-list li::after {
    content: attr(data-fullname);
    position: absolute;
    left: 100%;
    top: 50%;
    transform: translateY(-50%);
    margin-left: 15px;
    font-size: 14px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    pointer-events: none;
    background: rgba(0, 0, 0, 0.8);
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }
  
  #planet-list:hover li::after {
    opacity: 1;
    visibility: visible;
  }
  
  #planet-list li:hover {
    background: rgba(255, 255, 255, 0.2);
  }
  
  #planet-list li.active {
    background: rgba(255, 255, 255, 0.3);
    font-weight: bold;
  }
  
  #controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: white;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    
    #controls button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    #controls button:hover {
      background: rgba(255,255,255,0.2);
    }
    
    #planet-info {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      display: none;
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }
    
    #planet-info .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background 0.3s;
    }
    
    #planet-info .close-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }
    
    #planet-info h2 {
      margin-bottom: 15px;
      font-size: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
      padding-right: 30px;
    }
    
    #planet-info p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    #planet-info .planet-details {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    #planet-info .planet-details p {
      margin: 8px 0;
      font-size: 13px;
    }
    
    #planet-info .planet-details strong {
      color: #ffdd44;
    }
    
    #speed-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: white;
      z-index: 100;
    }
    
    #speed-control label {
      font-size: 14px;
      margin-right: 10px;
    }
    
    #speed-control input {
      width: 150px;
    }
    
    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      #ui h1 {
        font-size: 18px;
      }
      
      #ui p {
        font-size: 12px;
      }
      
      #planet-list {
        width: 50px;
        padding: 10px 5px;
      }
      
      #planet-list:hover {
        width: 160px;
        padding: 10px;
      }
      
      #planet-list h3 {
        font-size: 20px;
      }
      
      #planet-list li {
        padding: 8px;
      }
      
      .planet-icon {
        width: 25px;
        height: 25px;
      }
      
      #planet-list li::after {
        font-size: 12px;
        margin-left: 10px;
        padding: 4px 8px;
      }
      
      #controls {
        bottom: 10px;
        left: 10px;
      }
      
      #controls button {
        padding: 8px 12px;
        font-size: 11px;
        margin-right: 5px;
        margin-bottom: 5px;
      }
      
      #speed-control {
        bottom: 10px;
        right: 10px;
      }
      
      #speed-control label {
        font-size: 12px;
      }
      
      #speed-control input {
        width: 100px;
      }
      
      #planet-info {
        top: 10px;
        right: 10px;
        left: 10px;
        max-width: none;
        padding: 15px;
        max-height: 80vh;
        overflow-y: auto;
      }
      
      #planet-info h2 {
        font-size: 16px;
      }
      
      #planet-info p {
        font-size: 12px;
      }
      
      #planet-info .planet-details p {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="ui">
    <h1>太阳系 3D 可视化</h1>
    <p>Solar System 3D Visualization</p>
    <p>点击行星查看详情 | Click planets for details</p>
    <p>拖动旋转 | 滚轮缩放 | Drag to rotate | Scroll to zoom</p>
  </div>
  
  <div id="planet-list">
    <h3>🪐</h3>
    <ul>
      <li data-planet="水星" data-fullname="水星 | Mercury"><span class="planet-icon mercury"></span></li>
      <li data-planet="金星" data-fullname="金星 | Venus"><span class="planet-icon venus"></span></li>
      <li data-planet="地球" data-fullname="地球 | Earth"><span class="planet-icon earth"></span></li>
      <li data-planet="火星" data-fullname="火星 | Mars"><span class="planet-icon mars"></span></li>
      <li data-planet="木星" data-fullname="木星 | Jupiter"><span class="planet-icon jupiter"></span></li>
      <li data-planet="土星" data-fullname="土星 | Saturn"><span class="planet-icon saturn"></span></li>
      <li data-planet="天王星" data-fullname="天王星 | Uranus"><span class="planet-icon uranus"></span></li>
      <li data-planet="海王星" data-fullname="海王星 | Neptune"><span class="planet-icon neptune"></span></li>
    </ul>
  </div>
  
  <div id="controls">
    <button id="grand-tour">🌟 太阳系之旅 | Grand Tour</button>
    <button id="toggle-orbits">🔄 轨道 | Orbits</button>
    <button id="toggle-labels">🏷️ 标签 | Labels</button>
    <button id="toggle-voyagers">🚀 旅行者号 | Voyagers</button>
    <button id="toggle-eclipse">🌑 日食 | Eclipse</button>
    <button id="show-transfer">🛤️ 转移轨道 | Transfer</button>
    <button id="show-launch">🎯 发射 | Launch</button>
    <button id="toggle-sound">🔊 声音 | Sound</button>
  </div>
  
  <div id="planet-info">
    <button class="close-btn" onclick="hidePlanetInfo()">×</button>
    <h2 id="planet-name">行星名称</h2>
    <p id="planet-description">描述</p>
    <div class="planet-details">
      <p><strong>直径 Diameter:</strong> <span id="planet-diameter">-</span></p>
      <p><strong>年龄 Age:</strong> <span id="planet-age">-</span></p>
      <p><strong>表面温度 Surface Temp:</strong> <span id="planet-surface-temp">-</span></p>
      <p><strong>核心温度 Core Temp:</strong> <span id="planet-core-temp">-</span></p>
      <p><strong>类型 Type:</strong> <span id="planet-type">-</span></p>
      <p><strong>质量 Mass:</strong> <span id="planet-mass">-</span></p>
      <p><strong>光到地球 Light to Earth:</strong> <span id="planet-light-to-earth">-</span></p>
    </div>
  </div>
  
  <div id="speed-control">
    <label>速度 | Speed:</label>
    <input type="range" id="speed" min="0.1" max="10" step="0.1" value="1">
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="script.js"></script>
</body>
</html>
