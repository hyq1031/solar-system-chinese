<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太阳系 3D 可视化 - Solar System 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
    }
    
    #canvas-container {
      width: 100vw;
      height: 100vh;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 100;
    }
    
    #ui h1 {
      font-size: 24px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    
    #ui p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 5px;
    }
    
    #controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: white;
      z-index: 100;
    }
    
    #controls button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 10px 20px;
      margin-right: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    #controls button:hover {
      background: rgba(255,255,255,0.2);
    }
    
    #planet-info {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      display: none;
      z-index: 100;
    }
    
    #planet-info h2 {
      margin-bottom: 10px;
      font-size: 20px;
    }
    
    #planet-info p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    #speed-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: white;
      z-index: 100;
    }
    
    #speed-control label {
      font-size: 14px;
      margin-right: 10px;
    }
    
    #speed-control input {
      width: 150px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="ui">
    <h1>太阳系 3D 可视化</h1>
    <p>Solar System 3D Visualization</p>
    <p>点击行星查看详情 | Click planets for details</p>
    <p>拖动旋转 | 滚轮缩放 | Drag to rotate | Scroll to zoom</p>
  </div>
  
  <div id="controls">
    <button id="grand-tour">🌟 太阳系之旅 | Grand Tour</button>
    <button id="toggle-orbits">🔄 轨道 | Orbits</button>
    <button id="toggle-labels">🏷️ 标签 | Labels</button>
  </div>
  
  <div id="planet-info">
    <h2 id="planet-name">行星名称</h2>
    <p id="planet-description">描述</p>
  </div>
  
  <div id="speed-control">
    <label>速度 | Speed:</label>
    <input type="range" id="speed" min="0" max="10" step="0.1" value="1">
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="script.js"></script>
</body>
</html>
