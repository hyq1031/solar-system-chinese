<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>太阳系 3D 可视化 - Solar System 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
    }
    
    #canvas-container {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }

    #ui {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      color: white;
      z-index: 100;
      text-align: center;
    }
    
    #ui h1 {
      font-size: 18px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    
    #ui p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 5px;
    }
    
    #planet-list {
    position: absolute;
    left: max(20px, env(safe-area-inset-left));
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10, 10, 20, 0.9);
    padding: 15px 12px;
    border-radius: 50px;
    color: white;
    font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    max-height: none;
    overflow: visible;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
    backdrop-filter: blur(10px);
  }
  
  .planet-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.3s ease;
    position: relative;
  }
  
  .planet-item:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(1.05);
  }
  
  .planet-item.active {
    background: rgba(100, 150, 255, 0.2);
    box-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
  }
  
  .planet-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-bottom: 4px;
    box-shadow: 0 0 10px currentColor;
    transition: all 0.3s ease;
  }
  
  .planet-indicator.sun {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    box-shadow: 0 0 15px #ffd700, 0 0 30px rgba(255, 215, 0, 0.5);
  }
  
  .planet-indicator.mercury {
    background: linear-gradient(135deg, #a0a0a0, #707070);
    box-shadow: 0 0 8px #a0a0a0;
  }
  
  .planet-indicator.venus {
    background: linear-gradient(135deg, #e6c87a, #c9a854);
    box-shadow: 0 0 10px #e6c87a;
  }
  
  .planet-indicator.earth {
    background: linear-gradient(135deg, #6b93d6, #4f7dc9);
    box-shadow: 0 0 15px #6b93d6, 0 0 25px rgba(107, 147, 214, 0.5);
  }
  
  .planet-indicator.mars {
    background: linear-gradient(135deg, #c1440e, #a3360a);
    box-shadow: 0 0 10px #c1440e;
  }
  
  .planet-indicator.jupiter {
    background: linear-gradient(135deg, #d4a574, #b8956a);
    box-shadow: 0 0 12px #d4a574;
  }
  
  .planet-indicator.saturn {
    background: linear-gradient(135deg, #f4d59e, #e6c87a);
    box-shadow: 0 0 12px #f4d59e;
  }
  
  .planet-indicator.uranus {
    background: linear-gradient(135deg, #a8d8ea, #87ceeb);
    box-shadow: 0 0 12px #a8d8ea;
  }
  
  .planet-indicator.neptune {
    background: linear-gradient(135deg, #4b70dd, #3d5cc4);
    box-shadow: 0 0 12px #4b70dd;
  }
  
  .planet-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.8);
    transition: all 0.3s ease;
  }
  
  .planet-item.active .planet-label {
    color: #ffffff;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }
  
  .planet-item:hover .planet-label {
    color: rgba(255, 255, 255, 1);
  }
  
  .planet-item:hover .planet-indicator {
    transform: scale(1.2);
  }
  
  #controls {
      position: fixed;
      bottom: max(60px, calc(40px + env(safe-area-inset-bottom)));
      right: max(20px, env(safe-area-inset-right));
      color: white;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 300px;
      background: rgba(10, 10, 20, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 8px;
      backdrop-filter: blur(8px);
    }

    .toolbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toolbar-title {
      font-size: 10px;
      letter-spacing: 0.5px;
      opacity: 0.7;
      white-space: nowrap;
    }

    .toolbar-header-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    #controls button.toolbar-icon-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      border-radius: 6px;
    }

    @media (pointer: coarse) {
      #controls button.toolbar-icon-btn {
        width: 40px;
        height: 40px;
      }
    }

    .toolbar-body {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    #controls.minimized .toolbar-body {
      display: none;
    }

    #controls.closed {
      display: none;
    }

    .toolbar-reopen {
      position: fixed;
      bottom: max(60px, calc(40px + env(safe-area-inset-bottom)));
      right: max(20px, env(safe-area-inset-right));
      z-index: 100;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar-reopen:hover {
      background: rgba(255,255,255,0.25);
    }

    .toolbar-reopen[hidden] {
      display: none;
    }

    #controls button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.3s;
      white-space: nowrap;
      min-width: 0;
    }

    #controls button:hover {
      background: rgba(255,255,255,0.2);
    }

    #controls button.active {
      background: rgba(100, 150, 255, 0.3);
      border-color: rgba(100, 150, 255, 0.5);
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.3);
    }
    
    #planet-info {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      right: max(20px, env(safe-area-inset-right));
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      display: none;
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }
    
    #planet-info .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background 0.3s;
    }
    
    #planet-info .close-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }
    
    #planet-info h2 {
      margin-bottom: 15px;
      font-size: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
      padding-right: 30px;
    }
    
    #planet-info p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    #planet-info .planet-details {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    #planet-info .planet-details p {
      margin: 8px 0;
      font-size: 13px;
    }
    
    #planet-info .planet-details strong {
      color: #ffdd44;
    }
    
    #speed-control {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      right: max(20px, env(safe-area-inset-right));
      color: white;
      z-index: 100;
    }
    
    #speed-control label {
      font-size: 14px;
      margin-right: 10px;
    }
    
    #speed-control input {
      width: 150px;
    }
    
    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      #ui h1 {
        font-size: 18px;
      }
      
      #ui p {
        font-size: 12px;
      }
      
      #planet-list {
        width: 80px;
        padding: 15px 10px;
        left: max(10px, env(safe-area-inset-left));
      }

      .planet-item {
        padding: 6px 8px;
      }

      .planet-indicator {
        width: 10px;
        height: 10px;
      }

      .planet-label {
        font-size: 9px;
        letter-spacing: 0.5px;
      }

      #controls {
        bottom: max(50px, calc(30px + env(safe-area-inset-bottom)));
        right: max(10px, env(safe-area-inset-right));
        max-width: min(220px, calc(100vw - 20px));
        gap: 5px;
      }

      .toolbar-body {
        grid-template-columns: 1fr;
      }

      #controls button {
        padding: 6px 8px;
        font-size: 10px;
        white-space: normal;
      }

      .toolbar-reopen {
        bottom: max(50px, calc(30px + env(safe-area-inset-bottom)));
        right: max(10px, env(safe-area-inset-right));
        width: 40px;
        height: 40px;
      }

      #speed-control {
        bottom: max(10px, env(safe-area-inset-bottom));
        right: max(10px, env(safe-area-inset-right));
      }

      #speed-control label {
        font-size: 12px;
      }

      #speed-control input {
        width: 100px;
      }

      #planet-info {
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        left: max(10px, env(safe-area-inset-left));
        max-width: none;
        padding: 15px;
        max-height: 80vh;
        overflow-y: auto;
      }
      
      #planet-info h2 {
        font-size: 16px;
      }
      
      #planet-info p {
        font-size: 12px;
      }
      
      #planet-info .planet-details p {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="ui">
    <h1>太阳系 3D 可视化</h1>
  </div>
  
  <div id="planet-list">
    <div class="planet-item" data-planet="太阳" role="button" tabindex="0">
      <span class="planet-indicator sun"></span>
      <span class="planet-label">太阳</span>
    </div>
    <div class="planet-item" data-planet="水星" role="button" tabindex="0">
      <span class="planet-indicator mercury"></span>
      <span class="planet-label">水星</span>
    </div>
    <div class="planet-item" data-planet="金星" role="button" tabindex="0">
      <span class="planet-indicator venus"></span>
      <span class="planet-label">金星</span>
    </div>
    <div class="planet-item active" data-planet="地球" role="button" tabindex="0">
      <span class="planet-indicator earth"></span>
      <span class="planet-label">地球</span>
    </div>
    <div class="planet-item" data-planet="火星" role="button" tabindex="0">
      <span class="planet-indicator mars"></span>
      <span class="planet-label">火星</span>
    </div>
    <div class="planet-item" data-planet="木星" role="button" tabindex="0">
      <span class="planet-indicator jupiter"></span>
      <span class="planet-label">木星</span>
    </div>
    <div class="planet-item" data-planet="土星" role="button" tabindex="0">
      <span class="planet-indicator saturn"></span>
      <span class="planet-label">土星</span>
    </div>
    <div class="planet-item" data-planet="天王星" role="button" tabindex="0">
      <span class="planet-indicator uranus"></span>
      <span class="planet-label">天王星</span>
    </div>
    <div class="planet-item" data-planet="海王星" role="button" tabindex="0">
      <span class="planet-indicator neptune"></span>
      <span class="planet-label">海王星</span>
    </div>
  </div>

  <div id="controls">
    <div class="toolbar-header">
      <span class="toolbar-title">控制面板 | Controls</span>
      <div class="toolbar-header-actions">
        <button id="toolbar-minimize" class="toolbar-icon-btn" aria-label="最小化 | Minimize" title="最小化 | Minimize">−</button>
        <button id="toolbar-close" class="toolbar-icon-btn" aria-label="关闭 | Close" title="关闭 | Close">×</button>
      </div>
    </div>
    <div class="toolbar-body">
      <button id="grand-tour" aria-pressed="false">🌟 太阳系之旅 | Grand Tour</button>
      <button id="toggle-orbits" aria-pressed="true">🔄 轨道 | Orbits</button>
      <button id="toggle-labels" aria-pressed="true">🏷️ 标签 | Labels</button>
      <button id="toggle-voyagers" aria-pressed="true">🚀 旅行者号 | Voyagers</button>
      <button id="toggle-eclipse" aria-pressed="false">🌑 日食 | Eclipse</button>
      <button id="show-transfer" aria-pressed="false">🛤️ 转移轨道 | Transfer</button>
      <button id="show-launch" aria-pressed="false">🎯 发射 | Launch</button>
      <button id="toggle-sound" aria-pressed="false">🔊 声音 | Sound</button>
    </div>
  </div>
  <button id="controls-reopen" class="toolbar-reopen" aria-label="打开控制面板 | Open controls" title="打开控制面板 | Open controls" hidden>⚙️</button>
  
  <div id="planet-info">
    <button class="close-btn" onclick="hidePlanetInfo()">×</button>
    <h2 id="planet-name">行星名称</h2>
    <p id="planet-description">描述</p>
    <div class="planet-details">
      <p><strong>直径 Diameter:</strong> <span id="planet-diameter">-</span></p>
      <p><strong>年龄 Age:</strong> <span id="planet-age">-</span></p>
      <p><strong>表面温度 Surface Temp:</strong> <span id="planet-surface-temp">-</span></p>
      <p><strong>核心温度 Core Temp:</strong> <span id="planet-core-temp">-</span></p>
      <p><strong>类型 Type:</strong> <span id="planet-type">-</span></p>
      <p><strong>质量 Mass:</strong> <span id="planet-mass">-</span></p>
      <p><strong>光到地球 Light to Earth:</strong> <span id="planet-light-to-earth">-</span></p>
    </div>
  </div>
  
  <div id="speed-control">
    <label>速度 | Speed:</label>
    <input type="range" id="speed" min="0.1" max="10" step="0.1" value="1">
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="script.js"></script>
</body>
</html>
